<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kasipag Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  color: #f1f5f9;
  padding: 20px;
}

.header {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 20px;
  text-align: center;
}

.form {
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
  display: flex;
  gap: 10px;
  margin-bottom: 30px;
}

input {
  padding: 10px;
  border-radius: 8px;
  border: none;
  flex: 1;
}

button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #22c55e;
  color: white;
}

.card {
  background: #1e293b;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
}

.card-actions button {
  background: #3b82f6;
  margin-left: 5px;
}

.delete-btn {
  background: #ef4444;
}

.no-data {
  text-align: center;
  color: gray;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="header">👑 Kasipag Admin Dashboard</div>

<!-- ADD CUSTOMER -->
<div class="form">
  <input id="name" placeholder="Customer Name">
  <input id="amount" placeholder="Amount" type="number">
  <button onclick="addCustomer()">Add</button>
</div>

<!-- PAYMENT LIST -->
<div id="list"></div>

<!-- USER APPROVAL -->
<h2>🔐 Pending Account Requests</h2>
<div id="pendingList"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCbA1nHwbw_yYVI9MtbjZetYZx7_gmw25c",
  authDomain: "kasipag-app.firebaseapp.com",
  projectId: "kasipag-app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ADD CUSTOMER */
function addCustomer(){
  let name = document.getElementById("name").value;
  let amount = parseFloat(document.getElementById("amount").value);

  if(!name || !amount){
    alert("Fill all fields");
    return;
  }

  db.collection("payments").add({
    name,
    amount,
    assignedTo:"",
    status:"New",
    createdAt: new Date()
  });

  name.value = "";
  amount.value = "";
}

/* DELETE */
function deletePayment(id){
  db.collection("payments").doc(id).delete();
}

/* ASSIGN RIDER */
function assignRider(id, rider){
  db.collection("payments").doc(id).update({
    assignedTo:rider
  });
}

/* REALTIME LIST */
db.collection("payments").orderBy("createdAt","desc").onSnapshot(snapshot=>{
  let list = document.getElementById("list");
  list.innerHTML = "";

  if(snapshot.empty){
    list.innerHTML = "<div class='no-data'>No data</div>";
    return;
  }

  snapshot.forEach(doc=>{
    let d = doc.data();

    list.innerHTML += `
      <div class="card">
        <div>
          <b>${d.name}</b><br>
          ₱${d.amount}<br>
          ${d.assignedTo || "No Rider"}
        </div>
        <div class="card-actions">
          <select onchange="assignRider('${doc.id}', this.value)">
            <option value="">Assign</option>
            <option value="Rider 1">Rider 1</option>
            <option value="Rider 2">Rider 2</option>
            <option value="Rider 3">Rider 3</option>
          </select>
          <button class="delete-btn" onclick="deletePayment('${doc.id}')">X</button>
        </div>
      </div>
    `;
  });
});

/* =========================
   USER APPROVAL SYSTEM
========================= */

/* LOAD PENDING */
function loadPending(){

  let users = JSON.parse(localStorage.getItem("users")) || [];
  let container = document.getElementById("pendingList");

  container.innerHTML = "";

  let hasPending = false;

  users.forEach((u,i)=>{
    if(u.status === "pending"){
      hasPending = true;

      container.innerHTML += `
        <div class="card">
          <div>
            <b>${u.name}</b><br>
            ${u.email}<br>
            ${u.role}
          </div>
          <div class="card-actions">
            <button onclick="approveUser(${i})">Approve</button>
          </div>
        </div>
      `;
    }
  });

  if(!hasPending){
    container.innerHTML = "<div class='no-data'>No pending users</div>";
  }
}

/* APPROVE */
function approveUser(index){

  let users = JSON.parse(localStorage.getItem("users")) || [];
  let user = users[index];

  if(user.role.includes("rider")){
    let count = users.filter(u => u.assignedRole && u.assignedRole.includes("Rider")).length;
    user.assignedRole = "Rider " + (count + 1);
  }

  if(user.role === "cashier"){
    let count = users.filter(u => u.assignedRole && u.assignedRole.includes("Cashier")).length;
    user.assignedRole = "Cashier " + (count + 1);
  }

  user.status = "approved";

  localStorage.setItem("users", JSON.stringify(users));

  alert("Approved ✔");

  loadPending();
}

/* AUTO LOAD */
window.onload = () => {
  loadPending();
};

</script>

</body>
</html>
