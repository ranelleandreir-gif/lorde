<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kasipag Microfinancing</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter', sans-serif;
}

body {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg, #0f172a, #1e293b, #0b1220);
  color:#f1f5f9;
  overflow:hidden;
}

/* glow background */
body::before{
  content:"";
  position:absolute;
  width:500px;
  height:500px;
  background:#3b82f6;
  filter:blur(160px);
  opacity:.25;
  border-radius:50%;
  top:-150px;
  left:-150px;
}

.box {
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.1);
  padding:40px;
  border-radius:22px;
  width:380px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
  animation:fadeIn 0.8s ease;
}

@keyframes fadeIn {
  from { opacity:0; transform:translateY(25px); }
  to { opacity:1; transform:translateY(0); }
}

/* 🔥 LOGO */
.logo {
  width:110px;
  height:110px;
  margin:0 auto 25px;
  border-radius:25px;
  overflow:hidden;
  background:rgba(255,255,255,0.08);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 10px 30px rgba(59,130,246,0.4);
}

.logo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

h2 {
  font-size:28px;
  margin-bottom:10px;
}

.tagline {
  font-size:13px;
  color:#cbd5e1;
  margin-bottom:25px;
}

/* buttons */
button {
  width:100%;
  margin:10px 0;
  padding:14px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-size:15px;
  font-weight:600;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

.a {
  background:linear-gradient(90deg,#ef4444,#dc2626);
  color:white;
}

.b {
  background:linear-gradient(90deg,#22c55e,#16a34a);
  color:white;
}

.c {
  background:linear-gradient(90deg,#3b82f6,#1d4ed8);
  color:white;
}

.subtitle {
  font-size:12px;
  color:#94a3b8;
  margin-top:15px;
}
</style>
</head>

<body>

<div class="box">

  <!-- 🔥 LOGO IMAGE -->
  <div class="logo">
    <img src="logo.png" alt="Kasipag Logo">
  </div>

  <h2>Kasipag Microfinancing</h2>
  <div class="tagline">To HELP, to CREATE and to PROVIDE</div>

  <button class="a" onclick="go('admin')">Admin Portal</button>
  <button class="c" onclick="go('cashier')">Cashier Login</button>
  <button class="b" onclick="go('rider')">Rider Access</button>

  <div class="subtitle">Make every transaction fast, secure.</div>
</div>

<script>
function go(role){

  if(role === "admin"){
    window.location.href = "admin-access.html";
    return;
  }

  localStorage.setItem("selectedRole", role);
  window.location.href = "login.html";
}
</script>

</body>
</html>
