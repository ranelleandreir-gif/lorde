<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kasipag Microfinancing</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Inter', Arial, sans-serif;
  background:linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:#f1f5f9;
}
.box {
  background:linear-gradient(145deg, #1e293b 0%, #334155 100%);
  padding:40px;
  border-radius:20px;
  width:380px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
  animation:fadeIn 0.8s ease-out;
}
@keyframes fadeIn {
  from { opacity:0; transform:translateY(30px); }
  to { opacity:1; transform:translateY(0); }
}
.top-square {
  width:140px;
  height:140px;
  margin:0 auto 30px;
  background:linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
  border-radius:28px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:48px;
}
.top-square::before {
  content:'💰';
}
h2 {
  font-size:28px;
  margin-bottom:10px;
}
.tagline {
  font-size:14px;
  color:#cbd5e1;
  margin-bottom:25px;
}
button {
  width:100%;
  margin:10px 0;
  padding:15px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-size:16px;
  font-weight:600;
}
.a {
  background:#ef4444;
  color:white;
}
.b {
  background:#22c55e;
  color:white;
}
.c {
  background:#3b82f6;
  color:white;
}
.subtitle {
  font-size:13px;
  color:#94a3b8;
  margin-top:15px;
}
</style>
</head>

<body>

<div class="box">
  <div class="top-square"></div>
  <h2>Kasipag Microfinancing</h2>
  <div class="tagline">To HELP, to CREATE and to PROVIDE</div>

  <button class="a" onclick="go('admin')">Admin Portal</button>
  <button class="c" onclick="go('cashier')">Cashier Login</button>
  <button class="b" onclick="go('rider')">Rider Access</button>

  <div class="subtitle">Make every transaction fast, secure.</div>
</div>

<script>
function go(role){

  // 🔐 ADMIN → admin-login.html
  if(role === "admin"){
    window.location.href = "admin-access.html";
    return;
  }

  // 🚴💰 RIDER / CASHIER → login.html
  localStorage.setItem("selectedRole", role);
  window.location.href = "login.html";
}
</script>

</body>
</html>
