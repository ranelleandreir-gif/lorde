<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kasipag Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Inter', Arial, sans-serif;
  background:linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:#f1f5f9;
}

.box {
  background:linear-gradient(145deg, #1e293b 0%, #334155 100%);
  padding:40px;
  border-radius:20px;
  width:380px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
}

.logo-icon {
  width:80px;
  height:80px;
  margin:0 auto 25px;
  background:linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
}

h2 {
  font-size:28px;
  margin-bottom:10px;
}

.subtitle {
  font-size:14px;
  color:#94a3b8;
  margin-bottom:20px;
}

input {
  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:10px;
  border:none;
}

button {
  width:100%;
  padding:14px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.admin-btn {
  background:#0ea5e9;
}

.footer-text {
  font-size:12px;
  color:#64748b;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="box">
  <div class="logo-icon">🔐</div>
  <h2>Kasipag Login</h2>
  <div class="subtitle">Access your dashboard</div>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <!-- 🔥 ADMIN BUTTON -->
  <button class="admin-btn" onclick="goAdmin()">Login as Admin</button>

  <div class="footer-text">Demo: rider1 / rider123</div>
</div>

<script>
const accounts = {
  admin:   { user: "admin",   pass: "admin123" },

  rider1:  { user: "rider1",  pass: "rider123" },
  rider2:  { user: "rider2",  pass: "rider123" },
  rider3:  { user: "rider3",  pass: "rider123" },

  cashier: { user: "cashier", pass: "cash123" }
};

// 🔐 ADMIN ACCESS KEY
const ADMIN_KEY = "KASIPAG-2026";

// NORMAL LOGIN (RIDER + CASHIER)
function login() {
  const u = document.getElementById("username").value.trim();
  const p = document.getElementById("password").value.trim();

  let foundRole = null;

  for (const role in accounts) {
    if (accounts[role].user === u && accounts[role].pass === p) {
      foundRole = role;
      break;
    }
  }

  if (!foundRole) {
    alert("Invalid username or password");
    return;
  }

  // ❌ BLOCK ADMIN HERE
  if (foundRole === "admin") {
    alert("Use 'Login as Admin' button");
    return;
  }

  localStorage.setItem("role", foundRole);

  // 🚀 REDIRECT USERS
  if (foundRole === "rider1") {
    window.location.href = "/rider1-dashboard.html";
  }
  else if (foundRole === "rider2") {
    window.location.href = "/rider2-dashboard.html";
  }
  else if (foundRole === "rider3") {
    window.location.href = "/rider3-dashboard.html";
  }
  else if (foundRole === "cashier") {
    window.location.href = "/cashier-dashboard.html";
  }
}

// 🔥 ADMIN LOGIN BUTTON FUNCTION
function goAdmin() {
  let user = prompt("Admin Username:");
  let pass = prompt("Admin Password:");

  if (user === accounts.admin.user && pass === accounts.admin.pass) {

    let key = prompt("Enter Admin Access Key:");

    if (key === ADMIN_KEY) {
      localStorage.setItem("role", "admin");
      window.location.href = "/admin-dashboard.html";
    } else {
      alert("Invalid Access Key!");
    }

  } else {
    alert("Invalid Admin Account!");
  }
}

// ENTER KEY SUPPORT
document.getElementById("password").addEventListener("keypress", function(e) {
  if (e.key === "Enter") login();
});
</script>

</body>
</html>
