<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasipag Company Portal</title>

<style>
:root{
  --bg:#0b1220;
  --card:#111a2e;
  --text:#e5e7eb;
  --muted:#9ca3af;
  --accent:#3b82f6;
  --border:rgba(255,255,255,0.08);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI, sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
}

/* LOADER */
#loader{
  position:fixed;
  inset:0;
  background:#0b1220;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

.spinner{
  width:50px;
  height:50px;
  border:5px solid rgba(255,255,255,0.1);
  border-top:5px solid var(--accent);
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  100%{transform:rotate(360deg);}
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#0f172a;
}

.btn{
  padding:10px;
  border:none;
  background:var(--accent);
  color:white;
  border-radius:8px;
}

/* HERO */
.hero{
  text-align:center;
  padding:40px 20px;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.7);
}

.modal-box{
  width:90%;
  max-width:350px;
  background:var(--card);
  padding:20px;
  border-radius:12px;
}

input,select{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid var(--border);
  background:#0b1220;
  color:white;
}

#msg{
  font-size:12px;
  margin-top:5px;
}
</style>
</head>

<body>

<div id="loader">
  <div class="spinner"></div>
  <p style="color:#9ca3af;margin-top:10px;">Loading...</p>
</div>

<header>
  <div>Kasipag Portal</div>
  <button class="btn" onclick="openModal()">Create Account</button>
</header>

<div class="hero">
  <h1>Staff System</h1>
  <p style="color:#9ca3af;">Login or create account</p>

  <button class="btn" onclick="login()">Enter</button>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">

    <h3>Create Account</h3>

    <input id="name" placeholder="Full Name">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <select id="role">
      <option value="cashier">Cashier</option>
      <option value="rider">Rider</option>
    </select>

    <button class="btn" onclick="signup()">Submit</button>

    <p id="msg"></p>

  </div>
</div>

<script>

/* LOADER */
window.onload = () => {
  setTimeout(()=>{
    document.getElementById("loader").style.display="none";
  },1000);
};

/* MODAL */
function openModal(){
  modal.style.display="flex";
}

/* SIGNUP */
function signup(){

  let users = JSON.parse(localStorage.getItem("users")) || [];

  let newUser = {
    name: name.value,
    email: email.value,
    password: password.value,
    role: role.value,
    status: "pending",
    assignedRole: null
  };

  users.push(newUser);
  localStorage.setItem("users", JSON.stringify(users));

  msg.innerHTML = "Waiting for admin approval...";
  msg.style.color = "#facc15";
}

/* LOGIN */
function login(){

  let emailInput = prompt("Enter Email:");
  let passInput = prompt("Enter Password:");

  let users = JSON.parse(localStorage.getItem("users")) || [];

  let user = users.find(u => u.email === emailInput && u.password === passInput);

  if(!user){
    alert("User not found");
    return;
  }

  if(user.status !== "approved"){
    alert("Not approved by admin yet");
    return;
  }

  localStorage.setItem("role", user.assignedRole);

  /* AUTO REDIRECT */
  if(user.assignedRole.includes("Rider")){
    window.location.href = "rider.html";
  }else if(user.assignedRole.includes("Cashier")){
    window.location.href = "cashier.html";
  }

}

</script>

</body>
</html>
