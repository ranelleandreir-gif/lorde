<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasipag Company Portal</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI, sans-serif;
}

body{
  background:#0b1220;
  color:#e5e7eb;
  height:100vh;
  overflow:hidden;
}

/* soft background glow (more subtle pro feel) */
.bg-glow{
  position:absolute;
  width:520px;
  height:520px;
  background:radial-gradient(circle, #3b82f6 0%, transparent 70%);
  opacity:.18;
  top:-180px;
  left:-180px;
}

/* loader (more minimal corporate style) */
#loader{
  position:fixed;
  inset:0;
  background:#0b1220;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.spinner{
  width:54px;
  height:54px;
  border:4px solid rgba(255,255,255,0.12);
  border-top:4px solid #3b82f6;
  border-radius:50%;
  animation:spin 1s linear infinite;
  box-shadow:0 0 25px rgba(59,130,246,0.2);
}

@keyframes spin{
  100%{transform:rotate(360deg);}
}

#loader p{
  margin-top:14px;
  color:#94a3b8;
  font-size:13px;
  letter-spacing:0.5px;
}

/* center layout */
.container{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* main card (more premium glass) */
.card{
  width:440px;
  padding:38px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter:blur(22px);
  border-radius:22px;
  text-align:center;
  box-shadow:
    0 25px 70px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.05);
  animation:fade .7s ease;
}

@keyframes fade{
  from{opacity:0; transform:translateY(18px);}
  to{opacity:1; transform:translateY(0);}
}

/* logo upgraded (premium frame feel) */
.logo{
  width:92px;
  height:92px;
  margin:0 auto 18px;
  border-radius:20px;
  overflow:hidden;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 0 30px rgba(59,130,246,0.35);
}

.logo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* title hierarchy improved */
h1{
  font-size:27px;
  font-weight:700;
  letter-spacing:0.3px;
}

p{
  color:#94a3b8;
  font-size:13px;
  margin-top:6px;
}

/* buttons (more corporate style) */
.btn{
  width:100%;
  margin-top:16px;
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  background:linear-gradient(90deg,#3b82f6,#2563eb);
  color:white;
  transition:.2s;
  box-shadow:0 10px 25px rgba(59,130,246,0.15);
}

.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 15px 35px rgba(59,130,246,0.25);
}

/* secondary button */
.secondary{
  background:#111a2e;
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:none;
}

.secondary:hover{
  background:#162033;
}

/* footer text */
.small{
  font-size:11px;
  color:#6b7280;
  margin-top:14px;
  letter-spacing:0.2px;
}
</style>
</head>

<body>

<div class="bg-glow"></div>

<!-- LOADER -->
<div id="loader">
  <div class="spinner"></div>
  <p>Initializing Kasipag System...</p>
</div>

<!-- MAIN -->
<div class="container">
  <div class="card">

    <div class="logo">
      <img src="logo.png">
    </div>

    <h1>Kasipag Portal</h1>
    <p>Internal Staff Management System</p>

    <a href="una.html">
      <button class="btn">Enter System</button>
    </a>

    <button class="btn secondary" onclick="openModal()">Create Account</button>

    <div class="small">Secure access for authorized personnel only</div>

  </div>
</div>

<script>
window.onload = () => {
  setTimeout(()=>{
    document.getElementById("loader").style.display="none";
  },1100);
};
</script>

</body>
</html>
